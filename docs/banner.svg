<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07070A"/>
      <stop offset="100%" stop-color="#0F0F12"/>
    </linearGradient>
    <radialGradient id="glow" cx="22%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#CAFF3C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#CAFF3C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7BD0FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7BD0FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>
  <rect width="1280" height="360" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g stroke="#FAFAFA" stroke-opacity="0.025">
    <line x1="0" y1="60" x2="1280" y2="60"/>
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="640" y1="0" x2="640" y2="360"/>
    <line x1="800" y1="0" x2="800" y2="360"/>
    <line x1="960" y1="0" x2="960" y2="360"/>
    <line x1="1120" y1="0" x2="1120" y2="360"/>
  </g>

  <!-- Eclipse logo, large -->
  <g transform="translate(120, 120)">
    <circle cx="50" cy="60" r="42" fill="#CAFF3C"/>
    <circle cx="74" cy="60" r="42" fill="rgba(250,250,250,0.28)" stroke="rgba(250,250,250,0.55)" stroke-width="2.2"/>
  </g>

  <!-- Wordmark -->
  <text x="260" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="600" fill="#FAFAFA" letter-spacing="-4">prediqt</text>

  <!-- Tagline -->
  <text x="262" y="220" font-family="ui-monospace, 'SF Mono', monospace" font-size="14" letter-spacing="3" fill="#A1A1AA">PREDICTION MARKETS, ENCRYPTED</text>

  <!-- Right column: live stats mock -->
  <g transform="translate(820, 120)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="170" height="64" rx="12" fill="#18181B" stroke="rgba(255,255,255,0.06)"/>
    <text x="16" y="26" font-family="ui-monospace, monospace" font-size="11" fill="#71717A" letter-spacing="2">LIVE MARKETS</text>
    <text x="16" y="50" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#FAFAFA">12</text>
    <circle cx="146" cy="26" r="3" fill="#22C55E"/>

    <!-- Stat 2 -->
    <rect x="190" y="0" width="190" height="64" rx="12" fill="#18181B" stroke="rgba(255,255,255,0.06)"/>
    <text x="206" y="26" font-family="ui-monospace, monospace" font-size="11" fill="#71717A" letter-spacing="2">PREDQ WAGERED</text>
    <text x="206" y="50" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#CAFF3C">1,247</text>

    <!-- Stat 3: agents -->
    <rect x="0" y="80" width="380" height="78" rx="12" fill="#18181B" stroke="rgba(255,255,255,0.06)"/>
    <text x="16" y="106" font-family="ui-monospace, monospace" font-size="11" fill="#71717A" letter-spacing="2">AI AGENTS</text>
    <!-- Q -->
    <circle cx="22" cy="138" r="14" fill="rgba(217,255,60,0.10)" stroke="rgba(217,255,60,0.30)"/>
    <text x="22" y="142" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="14" fill="#D9FF3C">Q</text>
    <!-- H -->
    <circle cx="56" cy="138" r="14" fill="rgba(255,139,60,0.10)" stroke="rgba(255,139,60,0.30)"/>
    <text x="56" y="142" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="14" fill="#FF8B3C">H</text>
    <!-- D -->
    <circle cx="90" cy="138" r="14" fill="rgba(123,208,255,0.10)" stroke="rgba(123,208,255,0.30)"/>
    <text x="90" y="142" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="14" fill="#7BD0FF">D</text>
    <text x="120" y="143" font-family="ui-monospace, monospace" font-size="13" fill="#A1A1AA">Quanta · Hawk · Doubt</text>
  </g>
</svg>
